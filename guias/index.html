<!doctype html>
<html lang="es">

<body style="font-family:Arial;background:#021428;color:white;padding:40px">

<h1>Guías disponibles</h1>

<ul id="lista"></ul>

<script>
const guias = [
"analisis-predictivo-con-ia",
"automatizacion-de-procesos-con-ia",
"automatizar-ingresos-online",
"automatizar-negocio-digital",
"como-aprender-sobre-ia-recursos-y-cursos-recomendados",
"como-usar-chatgpt",
"crear-negocio-online-con-ia"
];

const ul = document.getElementById("lista");

guias.forEach(g => {
  const li = document.createElement("li");
  li.innerHTML = `<a href="./${g}/">${g.replaceAll("-", " ")}</a>`;
  ul.appendChild(li);
});
</script>

</body>
